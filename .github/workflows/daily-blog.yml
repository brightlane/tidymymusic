name: Daily Blog — Stream-Hub

on:
  schedule:
    - cron: '0 9 * * *'

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: stream-hub-blog
  cancel-in-progress: false

jobs:
  blog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync Latest Remote
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Verify Repository Files
        run: |
          echo "ROOT FILES:"
          ls -la

      - name: Detect Blog Generator
        id: detect_generator
        shell: bash
        run: |
          if [ -f blog_generator.py ]; then
            echo "generator=blog_generator.py" >> $GITHUB_OUTPUT
            echo "Using blog_generator.py"
          elif [ -f blog-generator.py ]; then
            echo "generator=blog-generator.py" >> $GITHUB_OUTPUT
            echo "Using blog-generator.py"
          else
            echo "ERROR: No blog generator found"
            exit 1
          fi

      - name: Run Blog Generator
        run: |
          python "${{ steps.detect_generator.outputs.generator }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USER: brightlane
          GH_REPO: Stream-Hub

      - name: Verify Generated Content
        run: |
          echo "POST-GENERATION FILES:"
          ls -la

      - name: Commit Changes
        shell: bash
        run: |
          git add .

          if git diff --cached --quiet; then
            echo "No blog changes detected"
            exit 0
          fi

          git commit -m "Daily blog update"

      - name: Safe Push Retry Loop
        shell: bash
        run: |
          for i in 1 2 3 4 5; do
            echo "Push attempt $i"

            git fetch origin main

            git rebase origin/main || {
              echo "Rebase conflict detected"
              git rebase --abort || true
              sleep 3
              continue
            }

            if git push origin main; then
              echo "Push successful"
              exit 0
            fi

            echo "Push rejected. Retrying..."
            sleep 5
          done

          echo "Failed to push after multiple attempts"
          exit 1

      - name: Workflow Complete
        run: |
          echo "Daily Blog — Stream-Hub completed successfully"
