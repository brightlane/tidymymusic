name: Daily Blog — Stream-Hub
on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:
jobs:
  blog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python blog_generator.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USER: brightlane
          GH_REPO: Stream-Hub
